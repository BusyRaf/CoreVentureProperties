<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core Property Ventures · Cornerstone Wireframe</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <style>
    html, body { margin: 0; padding: 0; background: #ede9df; min-height: 100%; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      color: #15182a;
      -webkit-font-smoothing: antialiased;
      padding: 40px 16px 80px;
    }
    .doc-meta {
      max-width: 420px;
      margin: 0 auto 18px;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      letter-spacing: .2em;
      color: #6a6e80;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }
    .frame {
      width: 420px;
      max-width: 100%;
      margin: 0 auto;
      background: #f4f1ea;
      box-shadow: 0 24px 60px rgba(21,24,42,.18), 0 4px 12px rgba(21,24,42,.08);
    }
    .frame-inner {
      width: 100%;
      min-height: 2150px;
      position: relative;
    }
    .doc-foot {
      max-width: 420px;
      margin: 18px auto 0;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      letter-spacing: .2em;
      color: #6a6e80;
      text-transform: uppercase;
      text-align: center;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

  <div class="doc-meta">
    <span>WIREFRAME · CORNERSTONE</span>
    <span>MOBILE · 400 PT</span>
  </div>

  <div class="frame">
    <div class="frame-inner" id="root"></div>
  </div>

  <div class="doc-foot">
    CORE PROPERTY VENTURES · LANDING PAGE · V1
  </div>

  <!-- Shared brand components (BrickMark, CoreLockup, HollyImg) -->
  <script type="text/babel">
    // Minimal context for HollyImg
    const HollyCtx = React.createContext({ showPhoto: true });

    function HollyImg({ width, height, round, frame = "navy" }) {
      const radius = round ? "50%" : 0;
      const border = frame === "gold"
        ? "1px solid var(--gold)"
        : frame === "none" ? "none" : "1px solid var(--navy)";
      return (
        <div style={{
          width, height, borderRadius: radius, border,
          overflow: "hidden", flex: `0 0 ${width}px`, background: "var(--paper-2)",
        }}>
          <img src="assets/holly.jpg" alt="Holly McNally"
               style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
        </div>
      );
    }

    function BrickMark({ size = 40, ring = 1.5 }) {
      return (
        <div style={{
          width: size, height: size, borderRadius: "50%",
          background: "var(--navy)",
          border: `${ring}px solid var(--gold)`,
          display: "flex", alignItems: "center", justifyContent: "center",
          flex: "0 0 auto",
        }}>
          <svg viewBox="0 0 24 16" width={size * 0.62} height={size * 0.42}>
            <rect x="0"  y="11" width="5" height="4" fill="var(--gold)" />
            <rect x="6"  y="11" width="5" height="4" fill="var(--gold)" />
            <rect x="12" y="11" width="5" height="4" fill="var(--gold)" />
            <rect x="18" y="11" width="5" height="4" fill="var(--gold)" />
            <rect x="3"  y="6"  width="5" height="4" fill="var(--gold)" />
            <rect x="9"  y="6"  width="5" height="4" fill="var(--gold)" />
            <rect x="15" y="6"  width="5" height="4" fill="var(--gold)" />
            <rect x="6"  y="1"  width="5" height="4" fill="var(--gold)" />
            <rect x="12" y="1"  width="5" height="4" fill="var(--gold)" />
          </svg>
        </div>
      );
    }

    function CoreLockup({ size = "md" }) {
      const sizes = {
        sm: { word: 18, gap: 10, mark: 26, sub: 7,   subGap: 3 },
        md: { word: 26, gap: 12, mark: 36, sub: 8.5, subGap: 4 },
        lg: { word: 40, gap: 16, mark: 54, sub: 11,  subGap: 6 },
      };
      const s = sizes[size];
      return (
        <div style={{ display: "inline-flex", alignItems: "center", gap: s.gap }}>
          <BrickMark size={s.mark} ring={1.5} />
          <div style={{ display: "inline-flex", flexDirection: "column", alignItems: "flex-start" }}>
            <span style={{
              fontFamily: "var(--display)", fontWeight: 800, fontSize: s.word,
              letterSpacing: "-.015em", color: "var(--navy)", lineHeight: 1
            }}>CORE</span>
            <div style={{ height: 1, background: "var(--gold)", width: "100%", marginTop: s.subGap }} />
            <div style={{
              fontFamily: "var(--type)", fontSize: s.sub, letterSpacing: ".35em",
              color: "var(--navy)", marginTop: s.subGap, textTransform: "uppercase", fontWeight: 500
            }}>
              Property · Ventures
            </div>
          </div>
        </div>
      );
    }

    Object.assign(window, { HollyImg, BrickMark, CoreLockup });
  </script>

  <script type="text/babel" src="wireframe-a.jsx"></script>

  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<WireframeA />);
  </script>
</body>
</html>
